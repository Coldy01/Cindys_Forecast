<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cindy's Forecast</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Cindy's Forecast ☀️</h1>
        
        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                autocomplete="off"
            >
            <button id="searchBtn">Search</button>
        </div>

        <div id="weatherInfo" class="weather-info hidden">
            <div class="weather-main">
                <h2 id="cityName"></h2>
                <div class="temperature">
                    <span id="temp"></span>
                    <span id="condition"></span>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-card">
                    <span class="label">Feels Like</span>
                    <span id="feelsLike" class="value"></span>
                </div>
                <div class="detail-card">
                    <span class="label">Humidity</span>
                    <span id="humidity" class="value"></span>
                </div>
                <div class="detail-card">
                    <span class="label">Wind Speed</span>
                    <span id="windSpeed" class="value"></span>
                </div>
                <div class="detail-card">
                    <span class="label">Pressure</span>
                    <span id="pressure" class="value"></span>
                </div>
            </div>
        </div>

        <div id="errorMsg" class="error-message hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
